<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracking System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <header>
        <h1>Satellite Tracking System</h1>
        <div id="status-bar">
            <span id="tracking-status">Idle</span>
            <span id="clock"></span>
        </div>
    </header>

    <main>
        <div class="panel-grid">
            <!-- Control Panel -->
            <section id="controls-panel" class="panel">
                <h2>Configuration</h2>
                <div id="controls-content"></div>
            </section>

            <!-- Polar Chart -->
            <section id="polar-panel" class="panel">
                <h2>Sky View (Az/El)</h2>
                <div id="polar-chart"></div>
            </section>

            <!-- 3D Globe -->
            <section id="globe-panel" class="panel">
                <h2>3D Globe</h2>
                <div id="globe-container"></div>
            </section>

            <!-- Passes Table -->
            <section id="passes-panel" class="panel">
                <h2>Predicted Passes</h2>
                <div id="passes-table"></div>
            </section>

            <!-- Gantt Chart -->
            <section id="gantt-panel" class="panel">
                <h2>Antenna Schedule</h2>
                <div id="gantt-chart"></div>
            </section>

            <!-- Validation Panel -->
            <section id="validation-panel" class="panel">
                <h2>N2YO Validation</h2>
                <div id="validation-content"></div>
            </section>
        </div>
    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/polar_chart.js"></script>
    <script src="/static/js/globe.js"></script>
    <script src="/static/js/gantt.js"></script>
    <script src="/static/js/validation_panel.js"></script>
    <script src="/static/js/controls.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
